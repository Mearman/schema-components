name: CI

on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

permissions:
    contents: write
    id-token: write
    issues: write
    pull-requests: write

jobs:
    lint-commits:
        name: Lint commits
        runs-on: ubuntu-latest
        if: github.event_name == 'pull_request'
        steps:
            - uses: actions/checkout@v6.0.2
              with:
                  fetch-depth: 0

            - uses: pnpm/action-setup@v6.0.8

            - uses: actions/setup-node@v6.4.0
              with:
                  node-version-file: .tool-versions
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - name: Lint commit messages
              run: |
                  pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

    audit:
        name: Audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6.0.2

            - uses: pnpm/action-setup@v6.0.8

            - uses: actions/setup-node@v6.4.0
              with:
                  node-version-file: .tool-versions
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - run: pnpm audit --audit-level high

    check:
        name: Check
        needs: audit
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6.0.2

            - uses: pnpm/action-setup@v6.0.8

            - uses: actions/setup-node@v6.4.0
              with:
                  node-version-file: .tool-versions
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - uses: actions/cache@v5.0.5
              with:
                  path: .turbo
                  key: turbo-${{ runner.os }}-${{ github.sha }}
                  restore-keys: |
                      turbo-${{ runner.os }}-

            - run: pnpm check

    test:
        name: Test — Node ${{ matrix.node-version }}
        needs: audit
        runs-on: ubuntu-latest
        strategy:
            matrix:
                node-version:
                    - 22
                    - 24
                    - 26
        steps:
            - uses: actions/checkout@v6.0.2

            - uses: pnpm/action-setup@v6.0.8

            - uses: actions/setup-node@v6.4.0
              with:
                  node-version: ${{ matrix.node-version }}
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - uses: actions/cache@v5.0.5
              with:
                  path: .turbo
                  key: turbo-${{ runner.os }}-${{ github.sha }}
                  restore-keys: |
                      turbo-${{ runner.os }}-

            - run: pnpm test

            - name: Coverage (Node 26 only)
              if: matrix.node-version == 26
              run: pnpm test:coverage

            - name: E2E tests (Node 26 only)
              if: matrix.node-version == 26
              run: pnpm --filter schema-components _test:e2e

    storybook-test:
        name: Storybook tests
        needs: check
        runs-on: ubuntu-latest
        container:
            image: mcr.microsoft.com/playwright:v1.59.1-noble
        steps:
            - uses: actions/checkout@v6.0.2

            - uses: pnpm/action-setup@v6.0.8

            - uses: actions/setup-node@v6.4.0
              with:
                  node-version-file: .tool-versions
                  cache: pnpm

            - run: pnpm install --frozen-lockfile

            - uses: actions/cache@v5.0.5
              with:
                  path: .turbo
                  key: turbo-${{ runner.os }}-${{ github.sha }}
                  restore-keys: |
                      turbo-${{ runner.os }}-

            - run: pnpm build

            - run: pnpm --filter @schema-components/docs test-storybook
              env:
                  PLAYWRIGHT_BROWSERS_PATH: /ms-playwright

    release:
        name: Release
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        needs: [check, test, storybook-test]
        runs-on: ubuntu-latest
        outputs:
            released: ${{ steps.detect-release.outputs.released }}
        steps:
            - uses: actions/checkout@v6.0.2
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - uses: pnpm/action-setup@v6.0.8

            - uses: actions/setup-node@v6.4.0
              with:
                  node-version-file: .tool-versions
                  cache: pnpm
                  # Do NOT set registry-url — it creates an .npmrc that overrides OIDC

            - run: pnpm install --frozen-lockfile

            - uses: actions/cache@v5.0.5
              with:
                  path: .turbo
                  key: turbo-${{ runner.os }}-${{ github.sha }}
                  restore-keys: |
                      turbo-${{ runner.os }}-

            - run: pnpm build

            - name: Release
              id: detect-release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  HUSKY: "0"
              run: |
                  pnpm exec semantic-release 2>&1 | tee release-output.txt
                  EXIT_CODE=${PIPESTATUS[0]}
                  if grep -q "Published release" release-output.txt; then
                    echo "released=true" >> "$GITHUB_OUTPUT"
                  else
                    echo "released=false" >> "$GITHUB_OUTPUT"
                  fi
                  exit $EXIT_CODE
